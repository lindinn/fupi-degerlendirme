<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUPİ — DYT Danışman Paneli</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f4f8; color: #222; font-size: 14px; }

    /* ── Login ── */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: white; padding: 48px 40px; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12); text-align: center; width: 340px;
    }
    .login-box .brand { font-size: 32px; font-weight: 900; color: #3C3489; letter-spacing: 3px; }
    .login-box .sub { font-size: 13px; color: #666; margin-top: 4px; margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 11px 14px; border: 1px solid #ccc; border-radius: 6px;
      font-size: 14px; margin-bottom: 12px;
    }
    .login-box input:focus { outline: none; border-color: #3C3489; }
    .login-box button {
      width: 100%; background: #3C3489; color: white; border: none;
      padding: 12px; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer;
    }
    .login-box button:hover { background: #534AB7; }
    .login-error { color: #c00; font-size: 13px; margin-top: 8px; display: none; }

    /* ── Panel ── */
    #panelScreen { display: none; }

    header {
      background: #3C3489; color: white; padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    header .brand { font-size: 22px; font-weight: 900; letter-spacing: 2px; }
    header .sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
    header button {
      background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3);
      padding: 7px 16px; border-radius: 5px; cursor: pointer; font-size: 13px;
    }

    .content { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }

    .toolbar {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .toolbar input {
      flex: 1; min-width: 200px; padding: 9px 14px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 14px;
    }
    .toolbar input:focus { outline: none; border-color: #3C3489; }
    .btn-refresh {
      background: #3C3489; color: white; border: none; padding: 9px 20px;
      border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold;
    }
    .btn-refresh:hover { background: #534AB7; }

    /* ── Table ── */
    .table-wrap { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: #3C3489; color: white; padding: 11px 14px;
      font-size: 12px; text-align: left; white-space: nowrap;
    }
    td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f7ff; }

    .score-badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: 12px; font-weight: bold;
    }
    .guclu { background: #d4edda; color: #155724; }
    .gelistirilebilir { background: #fff3cd; color: #856404; }
    .oncelikli { background: #f8d7da; color: #721c24; }

    .btn-pdf {
      background: #534AB7; color: white; border: none; padding: 6px 14px;
      border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold;
    }
    .btn-pdf:hover { background: #3C3489; }

    .empty-msg { text-align: center; padding: 40px; color: #888; }
    .loading-msg { text-align: center; padding: 40px; color: #3C3489; }
  </style>
</head>
<body>

<!-- ── Login ─────────────────────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="brand">FUPİ</div>
    <div class="sub">DYT Danışman Paneli</div>
    <input type="password" id="pwInput" placeholder="Şifre" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Giriş</button>
    <div class="login-error" id="loginError">Şifre hatalı.</div>
  </div>
</div>

<!-- ── Panel ─────────────────────────────────────────────────────────────── -->
<div id="panelScreen">
  <header>
    <div>
      <div class="brand">FUPİ</div>
      <div class="sub">Durumsal Yargı Testi — Danışman Paneli</div>
    </div>
    <button onclick="doLogout()">Çıkış</button>
  </header>

  <div class="content">
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="İsimle ara…" oninput="renderTable()">
      <button class="btn-refresh" onclick="loadData()">↻ Yenile</button>
    </div>

    <div class="table-wrap">
      <div id="tableContainer" class="loading-msg">Veriler yükleniyor…</div>
    </div>
  </div>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const PASSWORD = 'Claude2026!';
const ENDPOINT = 'https://script.google.com/macros/s/AKfycbx7GSYboTCJ5xS6TYeJA1_fQ91nX62k6euGNVyjKggQkrKx1tVUWsXcVmR__AXM6ZUqtA/exec';

// ─── Yetkinlik tanımları ──────────────────────────────────────────────────────
const YETKINLIKLER = [
  { key: 'Y1_Analiz_%',        ad: 'Analiz ve Problem Çözme' },
  { key: 'Y2_Isbirligi_%',     ad: 'İşbirliği Geliştirme' },
  { key: 'Y3_Degisim_%',       ad: 'Değişime Uyum ve Çeviklik' },
  { key: 'Y4_Iletisim_%',      ad: 'Etkili İletişim ve Müzakere' },
  { key: 'Y5_Yenilikcilik_%',  ad: 'Yenilikçilik' },
  { key: 'Y6_Teknoloji_%',     ad: 'Teknoloji ve Bilgi Okuryazarlığı' },
  { key: 'Y7_Basarma_%',       ad: 'Başarma Arzusu ve Girişimcilik' }
];

const YORUMLAR = {
  'Y1_Analiz_%': {
    guclu:          'Sorunların nedenlerini sistematik biçimde araştırır, veri odaklı kararlar alır ve alternatif çözümler üretir.',
    gelistirilebilir: 'Temel problem analizi yapabilmekle birlikte çok boyutlu değerlendirme ve sistematik çözüm geliştirme becerilerini güçlendirmesi önerilir.',
    oncelikli:      'Problem tanımlama ve çözüm geliştirme süreçlerinde yapılandırılmış yaklaşımların benimsenmesi öncelikli gelişim alanı olarak öne çıkmaktadır.'
  },
  'Y2_Isbirligi_%': {
    guclu:          'Ekip içi dinamiklere duyarlıdır, farklı bakış açılarını entegre eder ve iş birliği ortamı yaratır.',
    gelistirilebilir: 'Temel iş birliği becerilerine sahip olmakla birlikte ekip içi çatışma yönetimi ve beklenti yönetimi konularında gelişim potansiyeli taşımaktadır.',
    oncelikli:      'Ekip çalışması dinamiklerini kavrama ve iş birliği ortamı oluşturma becerileri öncelikli gelişim alanı olarak değerlendirilmektedir.'
  },
  'Y3_Degisim_%': {
    guclu:          'Değişen koşullara hızla uyum sağlar, belirsizlik ortamında alternatif planlar geliştirebilir.',
    gelistirilebilir: 'Değişime genel olarak açık olmakla birlikte ani ve kapsamlı değişiklikler karşısında esnekliğini artırması önerilir.',
    oncelikli:      'Değişim süreçlerine uyum ve çevik davranış geliştirme öncelikli çalışma alanı olarak belirlenmektedir.'
  },
  'Y4_Iletisim_%': {
    guclu:          'Düşüncelerini açık ve ikna edici biçimde ifade eder, etkin dinleme ve müzakere becerilerine hakimdir.',
    gelistirilebilir: 'Temel iletişim becerileri yeterli düzeyde olmakla birlikte ikna edici argümantasyon ve müzakere stratejileri konusunda gelişim önerilmektedir.',
    oncelikli:      'Etkili iletişim kurma ve müzakere süreçlerini yönetme becerileri öncelikli gelişim alanı olarak öne çıkmaktadır.'
  },
  'Y5_Yenilikcilik_%': {
    guclu:          'Alışılmışın dışında çözümler üretir, mevcut süreçleri sorgular ve yeni yaklaşımları benimsemekten çekinmez.',
    gelistirilebilir: 'Yenilikçi düşünce potansiyeli taşımakla birlikte risk alma ve farklı yaklaşımları deneme konusunda daha proaktif bir tutum geliştirilmesi önerilir.',
    oncelikli:      'Yaratıcı problem çözme ve yenilikçi yaklaşımlar geliştirme becerileri öncelikli gelişim alanı olarak değerlendirilmektedir.'
  },
  'Y6_Teknoloji_%': {
    guclu:          'Dijital araçlara hâkimdir, bilgi ihtiyacını doğru kaynaklardan karşılar ve yeni teknolojilere hızla uyum sağlar.',
    gelistirilebilir: 'Temel teknoloji kullanımı yeterli olmakla birlikte bilgi değerlendirme ve dijital araçları etkin kullanma konusunda gelişim önerilmektedir.',
    oncelikli:      'Teknoloji ve bilgi okuryazarlığı becerileri öncelikli gelişim alanı olarak belirlenmektedir.'
  },
  'Y7_Basarma_%': {
    guclu:          'Hedef odaklı çalışır, engellerle karşılaştığında motivasyonunu korur ve sorumluluk almaktan çekinmez.',
    gelistirilebilir: 'Başarı motivasyonu temel düzeyde mevcut olmakla birlikte zorluklar karşısında kararlılığı sürdürme ve inisiyatif alma konusunda gelişim potansiyeli taşımaktadır.',
    oncelikli:      'Hedef belirleme, motivasyonu koruma ve engellere rağmen işi tamamlama becerileri öncelikli gelişim alanı olarak değerlendirilmektedir.'
  }
};

// ─── Auth ─────────────────────────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('panelScreen').style.display = 'block';
    loadData();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('panelScreen').style.display = 'none';
  document.getElementById('pwInput').value = '';
}

// ─── Data ─────────────────────────────────────────────────────────────────────
let allData = [];

async function loadData() {
  document.getElementById('tableContainer').className = 'loading-msg';
  document.getElementById('tableContainer').innerHTML = 'Veriler yükleniyor…';
  try {
    const res = await fetch(ENDPOINT + '?action=read');
    allData = await res.json();
    renderTable();
  } catch (err) {
    document.getElementById('tableContainer').innerHTML = '<div class="empty-msg">Veri yüklenemedi. Lütfen tekrar deneyin.</div>';
  }
}

function seviye(pct) {
  if (pct >= 80) return { label: 'Güçlü Alan', cls: 'guclu', key: 'guclu' };
  if (pct >= 50) return { label: 'Geliştirilebilir', cls: 'gelistirilebilir', key: 'gelistirilebilir' };
  return { label: 'Öncelikli Gelişim', cls: 'oncelikli', key: 'oncelikli' };
}

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allData.filter(r => (r['Ad Soyad'] || '').toLowerCase().includes(q));

  if (filtered.length === 0) {
    document.getElementById('tableContainer').className = '';
    document.getElementById('tableContainer').innerHTML = '<div class="empty-msg">Kayıt bulunamadı.</div>';
    return;
  }

  let html = '<table><thead><tr>' +
    '<th>Ad Soyad</th><th>Tarih</th>' +
    '<th>Analiz</th><th>İşbirliği</th><th>Değişim</th><th>İletişim</th>' +
    '<th>Yenilikçilik</th><th>Teknoloji</th><th>Başarma</th>' +
    '<th>Toplam</th><th>Rapor</th>' +
    '</tr></thead><tbody>';

  filtered.forEach(function(r, i) {
    const tarih = r['Zaman Damgası'] ? new Date(r['Zaman Damgası']).toLocaleDateString('tr-TR') : '—';
    const toplam = r['Toplam_%'] !== undefined ? Math.round(r['Toplam_%']) : '—';
    const svToplam = seviye(toplam);

    html += '<tr>';
    html += '<td><strong>' + (r['Ad Soyad'] || '—') + '</strong></td>';
    html += '<td>' + tarih + '</td>';

    YETKINLIKLER.forEach(function(y) {
      const pct = r[y.key] !== undefined ? Math.round(r[y.key]) : null;
      if (pct === null) {
        html += '<td>—</td>';
      } else {
        const sv = seviye(pct);
        html += '<td><span class="score-badge ' + sv.cls + '">' + pct + '%</span></td>';
      }
    });

    html += '<td><span class="score-badge ' + svToplam.cls + '">' + toplam + '%</span></td>';
    html += '<td><button class="btn-pdf" onclick="generatePDF(' + i + ')">PDF</button></td>';
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('tableContainer').className = '';
  document.getElementById('tableContainer').innerHTML = html;

  // Store filtered for PDF indexing
  window._filteredData = filtered;
}

// --- PDF ---
function tr(s) {
  return (s||'').toString()
    .replace(/\u0130/g,'I').replace(/\u0131/g,'i')
    .replace(/\u011e/g,'G').replace(/\u011f/g,'g')
    .replace(/\u00dc/g,'U').replace(/\u00fc/g,'u')
    .replace(/\u015e/g,'S').replace(/\u015f/g,'s')
    .replace(/\u00d6/g,'O').replace(/\u00f6/g,'o')
    .replace(/\u00c7/g,'C').replace(/\u00e7/g,'c')
    .replace(/\u2014/g,'-');
}

async function generatePDF(idx) {
  const r = window._filteredData[idx];
  const { PDFDocument, rgb, StandardFonts } = PDFLib;
  const doc = await PDFDocument.create();

  // Roboto ile Turkce karakter destegi
  let fontReg, fontBold, useTR = false;
  try {
    const bytes = await fetch('https://lindinn.github.io/fupi-degerlendirme/Roboto-Regular.ttf')
      .then(res => { if (!res.ok) throw new Error(res.status); return res.arrayBuffer(); });
    fontReg  = await doc.embedFont(bytes);
    fontBold = await doc.embedFont(bytes);
    useTR = true;
  } catch(e) {
    fontReg  = await doc.embedFont(StandardFonts.Helvetica);
    fontBold = await doc.embedFont(StandardFonts.HelveticaBold);
  }
  function t(s) { return useTR ? String(s||'') : tr(s); }

  // FUPi logo renkleri (tam deger)
  const W=595, H=842, M=44;
  const PURPLE   = rgb(0.235,0.204,0.537);  // #3C3489
  const LTPURPLE = rgb(0.933,0.929,0.996);  // #EEEDFE
  const GREEN    = rgb(0.447,0.671,0.141);   // #72AB24 logo yesil
  const ORANGE   = rgb(0.949,0.580,0.059);   // #F2940F logo turuncu
  const RED      = rgb(0.843,0.059,0.078);   // #D70F14 logo kirmizi
  const MAVI     = rgb(0.380,0.573,0.773);   // #6192C5 logo mavi
  const MOR      = rgb(0.635,0.180,0.498);   // #A22E7F logo mor
  const LGRAY    = rgb(0.88,0.88,0.88);
  const GRAY     = rgb(0.45,0.45,0.45);
  const WHITE    = rgb(1,1,1);
  const DARK     = rgb(0.12,0.12,0.12);

  // Yetkinlik barlari icin sabit renkler (logo sirasinda)
  const YT_COLORS = [ORANGE, GREEN, MAVI, PURPLE, RED, MOR, rgb(0.204,0.596,0.859)];

  // Seviye rengi ve etiketi
  function svColor(key) { return key==='guclu'?GREEN : key==='gelistirilebilir'?ORANGE : RED; }
  function svLabel(key) { return key==='guclu'?t('Guclu Alan') : key==='gelistirilebilir'?t('Gelistirilebilir') : t('Oncelikli Gelisim'); }

  const bugun = new Date().toLocaleDateString('tr-TR');

  function addPage() {
    const p = doc.addPage([W,H]);
    p.drawRectangle({x:0,y:H-50,width:W,height:50,color:PURPLE});
    p.drawText('FUPI', {x:M,y:H-32,size:18,font:fontBold,color:WHITE});
    p.drawText(t('Durumsal Yargi Testi Raporu'), {x:M+52,y:H-32,size:10.5,font:fontReg,color:rgb(0.85,0.85,0.98)});
    p.drawRectangle({x:0,y:28,width:W,height:0.5,color:LGRAY});
    p.drawText(t('Bu rapor degerlendirme amaciyla hazirlanmistir.'), {x:M,y:14,size:7,font:fontReg,color:GRAY});
    p.drawText(bugun, {x:W-M-44,y:14,size:7,font:fontReg,color:GRAY});
    return p;
  }

  let page = addPage();
  let y = H-68;

  // --- Katilimci bilgisi ---
  page.drawRectangle({x:M,y:y-42,width:W-2*M,height:48,color:LTPURPLE,borderRadius:4});
  page.drawText(t('Katilimci'), {x:M+12,y:y-12,size:7.5,font:fontReg,color:GRAY});
  page.drawText(t(r['Ad Soyad']||'-'), {x:M+12,y:y-27,size:13,font:fontBold,color:PURPLE});
  const rawT = r['Zaman Damgasi']||r['Zaman Damgas\u0131']||'';
  const tarih = rawT ? new Date(rawT).toLocaleDateString('tr-TR') : '-';
  page.drawText(t('Uygulama Tarihi: ')+tarih, {x:W-M-128,y:y-20,size:8,font:fontReg,color:GRAY});
  y -= 60;

  // --- Genel Durum ---
  const totPct = Math.round(r['Toplam_%']||0);
  const svTop = seviye(totPct);
  const topClr = svColor(svTop.key);

  page.drawText(t('GENEL DURUM'), {x:M,y:y,size:8,font:fontBold,color:GRAY});
  y -= 16;

  // Bar + puan sag tarafta
  const gbW = W-2*M-60;
  page.drawRectangle({x:M,y:y-5,width:gbW,height:16,color:LGRAY,borderRadius:3});
  page.drawRectangle({x:M,y:y-5,width:Math.max(2,Math.round(gbW*totPct/100)),height:16,color:topClr,borderRadius:3});
  page.drawText(String(totPct), {x:M+gbW+10,y:y+1,size:20,font:fontBold,color:topClr});
  y -= 22;

  // Seviye etiketi
  page.drawText(svLabel(svTop.key), {x:M,y:y,size:8.5,font:fontBold,color:topClr});
  y -= 22;

  // Ayirici
  page.drawRectangle({x:M,y:y,width:W-2*M,height:0.5,color:LGRAY});
  y -= 14;

  // Yetkinlik baslik
  page.drawText(t('YETKINLIK BAZINDA SONUCLAR'), {x:M,y:y,size:8,font:fontBold,color:PURPLE});
  y -= 16;

  // Yorumlar (ASCII - Roboto yoksa guvenli)
  const yorumlar = {
    'Y1_Analiz_%': {
      guclu:           t('Sorunlarin nedenlerini sistematik bicimde arastirir, veri odakli kararlar alir ve alternatif cozumler uretir.'),
      gelistirilebilir:t('Temel problem analizi yapabilmekle birlikte cok boyutlu degerlendirme ve sistematik cozum gelistirme becerilerini guclendirmesi onerilir.'),
      oncelikli:       t('Problem tanimlama ve cozum gelistirme sureclerinde yapilandirilmis yaklasimlar benimsenmesi oncelikli gelisim alani olarak one cikmaktadir.')
    },
    'Y2_Isbirligi_%': {
      guclu:           t('Ekip ici dinamiklere duyarlidir, farkli bakis acilarini entegre eder ve is birligi ortami yaratir.'),
      gelistirilebilir:t('Temel is birligi becerilerine sahip olmakla birlikte ekip ici catisma yonetimi ve beklenti yonetimi konularinda gelisim potansiyeli tasimaktadir.'),
      oncelikli:       t('Ekip calismasi dinamiklerini kavrama ve is birligi ortami olusturma becerileri oncelikli gelisim alani olarak degerlendirilmektedir.')
    },
    'Y3_Degisim_%': {
      guclu:           t('Degisen kosullara hizla uyum saglar, belirsizlik ortaminda alternatif planlar gelistirebilir.'),
      gelistirilebilir:t('Degisime genel olarak acik olmakla birlikte ani ve kapsamli degisiklikler karsisinda esnekligini artirmasi onerilir.'),
      oncelikli:       t('Degisim sureclerine uyum ve cevik davranis gelistirme oncelikli calisma alani olarak belirlenmektedir.')
    },
    'Y4_Iletisim_%': {
      guclu:           t('Dusuncelerini acik ve ikna edici bicimde ifade eder, etkin dinleme ve muzakere becerilerine hakimdir.'),
      gelistirilebilir:t('Temel iletisim becerileri yeterli duzeyde olmakla birlikte ikna edici argumantas yon ve muzakere stratejileri konusunda gelisim onerilmektedir.'),
      oncelikli:       t('Etkili iletisim kurma ve muzakere sureclerini yonetme becerileri oncelikli gelisim alani olarak one cikmaktadir.')
    },
    'Y5_Yenilikcilik_%': {
      guclu:           t('Alisildik disinda cozumler uretir, mevcut surecleri sorgular ve yeni yaklasimlar i benimsemekten cekinmez.'),
      gelistirilebilir:t('Yenilikci dusunce potansiyeli tasimakla birlikte risk alma ve farkli yaklasimlar deneme konusunda daha proaktif bir tutum gelistirilmesi onerilir.'),
      oncelikli:       t('Yaratici problem cozme ve yenilikci yaklasimlar gelistirme becerileri oncelikli gelisim alani olarak degerlendirilmektedir.')
    },
    'Y6_Teknoloji_%': {
      guclu:           t('Dijital araclara hakimdir, bilgi ihtiyacini dogru kaynaklardan karsilar ve yeni teknolojilere hizla uyum saglar.'),
      gelistirilebilir:t('Temel teknoloji kullanimi yeterli olmakla birlikte bilgi degerlendirme ve dijital araclari etkin kullanma konusunda gelisim onerilmektedir.'),
      oncelikli:       t('Teknoloji ve bilgi okuryazarligi becerileri oncelikli gelisim alani olarak belirlenmektedir.')
    },
    'Y7_Basarma_%': {
      guclu:           t('Hedef odakli calisir, engellerle karsilastiginda motivasyonunu korur ve sorumluluk almaktan cekinmez.'),
      gelistirilebilir:t('Basari motivasyonu temel duzeyde mevcut olmakla birlikte zorluklar karsisinda kararliligi surdurme ve inisiyatif alma konusunda gelisim potansiyeli tasimaktadir.'),
      oncelikli:       t('Hedef belirleme, motivasyonu koruma ve engellere ragmen isi tamamlama becerileri oncelikli gelisim alani olarak degerlendirilmektedir.')
    }
  };

  const ytAdlari = [
    t('Analiz ve Problem Cozme'),
    t('Isbirligi Gelistirme'),
    t('Degisime Uyum ve Ceviklik'),
    t('Etkili Iletisim ve Muzakere'),
    t('Yenilikcilik'),
    t('Teknoloji ve Bilgi Okuryazarligi'),
    t('Basarma Arzusu ve Girisimcilik')
  ];

  for (let i=0; i<YETKINLIKLER.length; i++) {
    const yt    = YETKINLIKLER[i];
    const pct   = Math.round(r[yt.key]||0);
    const sv    = seviye(pct);
    const barClr= YT_COLORS[i];   // logo rengi - sabit per yetkinlik
    const svClr = svColor(sv.key); // seviye rengi
    const yorum = yorumlar[yt.key][sv.key];

    // Blok icin yer kontrol
    if (y - 72 < 48) { page=addPage(); y=H-68; }

    // Satir 1: isim (sol) + puan sayisi (sag)
    const adW = fontBold.widthOfTextAtSize(String(pct), 16);
    page.drawText((i+1)+'. '+ytAdlari[i], {x:M,y:y,size:9,font:fontBold,color:PURPLE});
    page.drawText(String(pct), {x:W-M-adW,y:y,size:16,font:fontBold,color:barClr});
    y -= 16;

    // Satir 2: Bar (tam genislik)
    const bW = W-2*M;
    page.drawRectangle({x:M,y:y-4,width:bW,height:11,color:LGRAY,borderRadius:2});
    page.drawRectangle({x:M,y:y-4,width:Math.max(2,Math.round(bW*pct/100)),height:11,color:barClr,borderRadius:2});
    y -= 18;

    // Satir 3: Seviye etiketi
    page.drawText(svLabel(sv.key), {x:M,y:y,size:7.5,font:fontBold,color:svClr});
    y -= 13;

    // Yorum satirlari
    const words = yorum.split(' ');
    let line='';
    const ls=[];
    const mxW=W-2*M;
    words.forEach(w=>{
      const test=line?line+' '+w:w;
      if(fontReg.widthOfTextAtSize(test,7.5)>mxW){ls.push(line);line=w;}
      else line=test;
    });
    if(line)ls.push(line);
    ls.forEach(l=>{
      if(y<48){page=addPage();y=H-68;}
      page.drawText(l,{x:M,y:y,size:7.5,font:fontReg,color:DARK});
      y-=11;
    });

    y-=6;
    if(i<YETKINLIKLER.length-1){
      page.drawRectangle({x:M,y:y+3,width:W-2*M,height:0.5,color:LGRAY});
      y-=8;
    }
  }

  const pdfBytes=await doc.save();
  const blob=new Blob([pdfBytes],{type:'application/pdf'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const ad=tr(r['Ad Soyad']||'rapor').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
  a.href=url; a.download='FUPI_DYT_'+ad+'_'+bugun.replace(/\./g,'-')+'.pdf';
  a.click(); URL.revokeObjectURL(url);
}
</script>
</body>
</html>
