<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FUPİ — Uygulama Değerlendirme Paneli</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F0EFF8;font-family:system-ui,Arial,sans-serif;color:#222;}
.header{background:#3C3489;padding:13px 24px;display:flex;align-items:center;gap:14px;}
.logo{font-size:22px;font-weight:900;color:#fff;letter-spacing:3px;}
.logo-sub{font-size:7px;color:#bbb;letter-spacing:2px;margin-top:2px;}
.header-title{color:#EEEDFE;font-size:13px;font-weight:600;border-left:2px solid #534AB7;padding-left:14px;}
.wrap{max-width:900px;margin:0 auto;padding:16px;}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 10px rgba(60,52,137,0.08);margin-bottom:14px;}
.danisan-input{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;color:#222;}
.danisan-input:focus{outline:none;border-color:#3C3489;}

/* YETKİNLİK KARTI */
.ytk-card{background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(60,52,137,0.08);margin-bottom:14px;overflow:hidden;}
.ytk-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.ytk-baslik{font-size:14px;font-weight:700;color:#fff;}
.ytk-tanim{font-size:11px;color:rgba(255,255,255,0.85);margin-top:3px;}
.ytk-puan-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.ytk-puan-label{font-size:11px;color:rgba(255,255,255,0.8);white-space:nowrap;}
.ytk-puan-inp{width:52px;padding:5px;border:2px solid rgba(255,255,255,0.6);border-radius:7px;font-size:15px;font-weight:800;text-align:center;font-family:inherit;background:rgba(255,255,255,0.15);color:#fff;}
.ytk-puan-inp:focus{outline:none;border-color:#fff;}
.ytk-puan-badge{font-size:10px;color:rgba(255,255,255,0.9);white-space:nowrap;}
.ytk-body{padding:14px 18px;}

/* DAVRANIŞLAR */
.dv-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F0F0F8;}
.dv-row:last-child{border-bottom:none;}
.dv-metin{flex:1;font-size:12.5px;color:#333;line-height:1.5;}
.dv-butonlar{display:flex;gap:5px;flex-shrink:0;}
.dv-btn{padding:5px 10px;border-radius:20px;border:1.5px solid;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;background:#fff;}
.dv-btn.etkili{border-color:#72AB24;color:#72AB24;}
.dv-btn.etkili.aktif{background:#72AB24;color:#fff;}
.dv-btn.kismen{border-color:#F2940F;color:#F2940F;}
.dv-btn.kismen.aktif{background:#F2940F;color:#fff;}
.dv-btn.etkisiz{border-color:#D70F14;color:#D70F14;}
.dv-btn.etkisiz.aktif{background:#D70F14;color:#fff;}

.gen-btn{width:100%;padding:13px;border-radius:10px;border:none;background:#3C3489;color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:6px;}
.gen-btn:hover{background:#534AB7;}

/* RAPOR */
.rapor-section{display:none;}
.rapor-card{background:#fff;border-radius:12px;padding:28px 32px;box-shadow:0 2px 10px rgba(60,52,137,0.08);margin-bottom:14px;}
.rapor-header{background:#3C3489;border-radius:10px;padding:18px 24px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;}
.rapor-baslik{color:#fff;font-size:16px;font-weight:700;}
.rapor-alt{color:#EEEDFE;font-size:12px;margin-top:3px;}
.pdf-btn{padding:8px 20px;background:#fff;color:#3C3489;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.ytk-rapor-blok{margin-bottom:28px;page-break-inside:avoid;break-inside:avoid;}
.ytk-rapor-baslik{font-size:14px;font-weight:700;padding:8px 14px;border-radius:7px 7px 0 0;display:flex;align-items:center;justify-content:space-between;}
.ytk-rapor-puan{font-size:12px;font-weight:600;opacity:0.9;}
table.ytk-tablo{width:100%;border-collapse:collapse;border:1px solid #E0E0E8;border-top:none;}
table.ytk-tablo th{padding:8px 14px;font-size:11.5px;font-weight:700;text-align:left;border-bottom:1.5px solid #E0E0E8;}
table.ytk-tablo th.guclu{background:#F1F8E9;color:#2E7D32;}
table.ytk-tablo th.gelisim{background:#FFF8E1;color:#E65100;}
table.ytk-tablo td{padding:7px 14px;font-size:12px;color:#333;vertical-align:top;line-height:1.6;border-bottom:1px solid #F0F0F8;width:50%;}
table.ytk-tablo td:first-child{border-right:1px solid #E0E0E8;}
table.ytk-tablo tr:last-child td{border-bottom:none;}
.rapor-footer{margin-top:32px;padding-top:12px;border-top:1px solid #ddd;text-align:center;font-size:11px;color:#aaa;}

@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body{background:#fff;}
  .header{display:none!important;}
  .pdf-btn{display:none!important;}
  .wrap>*:not(.rapor-section){display:none!important;}
  .rapor-section{display:block!important;}
  .rapor-card{box-shadow:none;padding:16px 0;}
  @page{margin:15mm;size:A4;}
}
</style>
</head>
<body>
<div class="header">
  <div><div class="logo">FUPİ</div><div class="logo-sub">KARİYER TASARIMI</div></div>

</div>

const PUAN_LABEL = {1:"Etkisiz",2:"Gelişime İhtiyacı Var",3:"Çoğunlukla Etkili",4:"Etkili",5:"Çok Etkili"};

// Durum hafızası: {ytkKey: {dvIdx: 'etkili'|'kismen'|'etkisiz'}}
const durumlar = {};
const puanlar = {};
YETKINLIKLER.forEach(y => { durumlar[y.key] = {}; puanlar[y.key] = 3; });

function buildForms(){
  const liste = document.getElementById("ytk-listesi");
  YETKINLIKLER.forEach(ytk => {
    const div = document.createElement("div");
    div.className = "ytk-card";
    div.innerHTML = `
      <div class="ytk-header" style="background:${ytk.renk};">
        <div>
          <div class="ytk-baslik">${ytk.key} — ${ytk.ad}</div>
          <div class="ytk-tanim">${ytk.tanim}</div>
        </div>
        <div class="ytk-puan-wrap">
          <div class="ytk-puan-label">Genel Puan (1–5)</div>
          <input class="ytk-puan-inp" id="puan-${ytk.key}" type="number" min="1" max="5" step="1" value="3"
            oninput="onPuan('${ytk.key}',this.value)" onblur="onPuanBlur('${ytk.key}',this.value)"/>
          <div class="ytk-puan-badge" id="badge-${ytk.key}">Çoğunlukla Etkili</div>
        </div>
      </div>
      <div class="ytk-body">
        ${ytk.davranislar.map((dv,i) => `
          <div class="dv-row" id="dv-${ytk.key}-${i}">
            <div class="dv-metin">${i+1}. ${dv}</div>
            <div class="dv-butonlar">
              <button class="dv-btn etkili" onclick="setDurum('${ytk.key}',${i},'etkili',this)" style="border-color:${ytk.renk};color:${ytk.renk};">Etkili</button>
              <button class="dv-btn kismen" onclick="setDurum('${ytk.key}',${i},'kismen',this)">Kısmen</button>
              <button class="dv-btn etkisiz" onclick="setDurum('${ytk.key}',${i},'etkisiz',this)">Etkisiz</button>
            </div>
          </div>`).join("")}
      </div>`;
    liste.appendChild(div);
  });
}

function setDurum(ytkKey, dvIdx, durum, btn){
  durumlar[ytkKey][dvIdx] = durum;
  const row = document.getElementById(`dv-${ytkKey}-${dvIdx}`);
  row.querySelectorAll(".dv-btn").forEach(b => b.classList.remove("aktif"));
  btn.classList.add("aktif");
}

function onPuan(key,val){
  const v=parseInt(val);
  if(!isNaN(v)&&v>=1&&v<=5){ puanlar[key]=v; updateBadge(key,v); }
}
function onPuanBlur(key,val){
  let v=parseInt(val); if(isNaN(v)||v<1)v=1; if(v>5)v=5;
  puanlar[key]=v; document.getElementById("puan-"+key).value=v; updateBadge(key,v);
}
function updateBadge(key,v){
  document.getElementById("badge-"+key).textContent = PUAN_LABEL[v]||"";
}

function generateRapor(){
  const ad = document.getElementById("danisan-ad").value.trim();
  const tarih = new Date().toLocaleDateString("tr-TR");
  document.getElementById("rapor-alt").textContent = (ad||"Danışan") + " · " + tarih;

  let html = "";

  YETKINLIKLER.forEach(ytk => {
    const puan = puanlar[ytk.key];
    const pLabel = PUAN_LABEL[puan];
    const guclu = [], gelisim = [];

    ytk.davranislar.forEach((dv,i) => {
      const d = durumlar[ytk.key][i];
      if(d === "etkili") guclu.push(dv);
      else if(d === "kismen" || d === "etkisiz") gelisim.push({dv, tip: d});
    });

    const maxRows = Math.max(guclu.length, gelisim.length, 1);

    html += `<div class="ytk-rapor-blok">
      <div class="ytk-rapor-baslik" style="background:${ytk.renk};color:#fff;">
        <span>${ytk.ad}</span>
        <span class="ytk-rapor-puan">Puan: ${puan}/5 — ${pLabel}</span>
      </div>
      <table class="ytk-tablo">
        <thead><tr>
          <th class="guclu">✦ Güçlü Yönler</th>
          <th class="gelisim">⟳ Gelişim Alanları</th>
        </tr></thead>
        <tbody>
          ${Array.from({length:maxRows},(_,i)=>`<tr>
            <td>${guclu[i]?`• ${guclu[i]}`:"—"}</td>
            <td>${gelisim[i]?`• ${gelisim[i].dv}${gelisim[i].tip==="kismen"?" <em style='color:#999;font-size:10px;'>(kısmen etkili)</em>":""}`:"—"}</td>
          </tr>`).join("")}
        </tbody>
      </table>
    </div>`;
  });

  document.getElementById("rapor-icerik").innerHTML = html;
  const sec = document.getElementById("rapor-section");
  sec.style.display = "block";
  sec.scrollIntoView({behavior:"smooth"});
}

buildForms();
</script>
</body>
</html>
