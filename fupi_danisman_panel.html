<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUPi — Danışman Paneli</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap');
  :root{--dark:#0f0f1a;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--orange:#F5A623;--orange-dim:rgba(245,166,35,0.12);--text:#e8e8f0;--muted:#7a7a9a;--faint:#3a3a5a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
  body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(245,166,35,0.04) 0%,transparent 60%);pointer-events:none;z-index:0}

  /* LOGIN */
  .login-wrap{max-width:380px;margin:8vh auto 0;padding:2rem;background:var(--card);border:.5px solid var(--border);border-radius:16px;position:relative;z-index:1}
  .login-title{font-size:20px;font-weight:500;color:#fff;margin-bottom:.35rem}
  .login-sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
  .field-label{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.4rem;display:block}
  .field-input{width:100%;background:rgba(255,255,255,0.03);border:.5px solid var(--border);border-radius:8px;padding:.7rem 1rem;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:1rem}
  .field-input:focus{border-color:var(--orange)}
  .btn-main{background:var(--orange);color:#0f0f1a;border:none;border-radius:10px;padding:.65rem 1.5rem;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;transition:opacity .15s}
  .btn-main:hover{opacity:.88}
  .login-err{font-size:12px;color:#e07b7b;margin-top:.75rem;display:none}

  /* PANEL */
  .wrap{max-width:1000px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:1}
  .screen{display:none}.screen.active{display:block}
  .header{display:flex;align-items:center;justify-content:space-between;padding-bottom:1.25rem;margin-bottom:2rem;border-bottom:.5px solid var(--border)}
  .header-left{display:flex;align-items:center;gap:12px}
  .panel-badge{font-size:10px;color:var(--orange);letter-spacing:.12em;text-transform:uppercase;font-weight:500}
  .btn-sm{background:transparent;color:var(--muted);border:.5px solid var(--border);border-radius:8px;padding:.4rem .9rem;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
  .btn-sm:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
  .btn-refresh{background:var(--orange-dim);color:var(--orange);border:.5px solid rgba(245,166,35,.3);border-radius:8px;padding:.4rem .9rem;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
  .btn-refresh:hover{background:rgba(245,166,35,.2)}

  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:2rem}
  .stat-box{background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:1rem 1.25rem}
  .stat-num{font-size:28px;font-weight:500;color:#fff;margin-bottom:2px;font-family:'DM Mono',monospace}
  .stat-lbl{font-size:11px;color:var(--muted)}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:.6rem .75rem;text-align:left;border-bottom:.5px solid var(--border);font-weight:500;white-space:nowrap}
  td{padding:.75rem .75rem;border-bottom:.5px solid rgba(255,255,255,.04);color:var(--text);vertical-align:middle}
  tr:hover td{background:rgba(255,255,255,.02)}
  .chip{display:inline-block;font-size:11px;padding:2px 9px;border-radius:12px;font-weight:500;white-space:nowrap}
  .chip-g{background:rgba(245,166,35,.15);color:#F5A623}
  .chip-s{background:rgba(127,119,221,.15);color:#7F77DD}
  .chip-u{background:rgba(29,158,117,.15);color:#1D9E75}
  .chip-d{background:rgba(55,138,221,.15);color:#378ADD}
  .btn-pdf{background:var(--orange-dim);color:var(--orange);border:.5px solid rgba(245,166,35,.3);border-radius:6px;padding:.35rem .8rem;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500}
  .btn-pdf:hover{background:rgba(245,166,35,.2)}
  .empty{text-align:center;padding:3rem;color:var(--muted);font-size:14px;line-height:1.8}
  .loading-msg{text-align:center;padding:3rem;color:var(--muted);font-size:14px}
</style>
</head>
<body>

<!-- GİRİŞ -->
<div id="login-screen" class="screen active">
  <div class="login-wrap">
    <img src="https://lindinn.github.io/fupi-degerlendirme/fupi_logo.png" alt="FUPi" style="height:48px;width:auto;margin-bottom:1.5rem;display:block">
    <div class="login-title">Danışman Paneli</div>
    <div class="login-sub">Devam etmek için şifrenizi girin.</div>
    <label class="field-label">Şifre</label>
    <input class="field-input" type="password" id="pw-input" placeholder="••••••••">
    <button class="btn-main" onclick="login()">Giriş yap</button>
    <div class="login-err" id="login-err">Şifre yanlış. Tekrar deneyin.</div>
  </div>
</div>

<!-- PANEL -->
<div id="panel-screen" class="screen">
<div class="wrap">
  <div class="header">
    <div class="header-left">
      <img src="https://lindinn.github.io/fupi-degerlendirme/fupi_logo.png" alt="FUPi" style="height:40px;width:auto">
      <div>
        <div class="panel-badge">Danışman Paneli</div>
        <div style="font-size:12px;color:var(--muted)" id="panel-date"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-refresh" onclick="loadData()">↻ Yenile</button>
      <button class="btn-sm" onclick="logout()">Çıkış</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="stat-total">—</div><div class="stat-lbl">Toplam kayıt</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-baskin">—</div><div class="stat-lbl">En yaygın profil</div></div>
    <div class="stat-box"><div class="stat-num" id="stat-son">—</div><div class="stat-lbl">Son katılımcı</div></div>
  </div>

  <div id="table-wrap"><div class="loading-msg">Yükleniyor...</div></div>
</div>
</div>

<script>
const SIFRE = "Claude2026!";
const WEBHOOK = "https://script.google.com/macros/s/AKfycbzAlSvreppeCCjnor6cEbceVXt_XKl9CMTB0WN2uGkuOJijFfnPfpAvwWfzP4PxlASx_A/exec";

let tumKayitlar = [];

document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('pw-input').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
});

function login(){
  if(document.getElementById('pw-input').value === SIFRE){
    document.getElementById('login-err').style.display='none';
    document.getElementById('login-screen').classList.remove('active');
    document.getElementById('panel-screen').classList.add('active');
    document.getElementById('panel-date').textContent = new Date().toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});
    loadData();
  } else {
    document.getElementById('login-err').style.display='block';
  }
}

function logout(){
  document.getElementById('panel-screen').classList.remove('active');
  document.getElementById('login-screen').classList.add('active');
  document.getElementById('pw-input').value='';
}

async function loadData(){
  document.getElementById('table-wrap').innerHTML='<div class="loading-msg">Veriler yükleniyor...</div>';
  try {
    const res = await fetch(WEBHOOK+'?action=read');
    const raw = await res.json();

    if(!raw || raw.length < 2){
      document.getElementById('table-wrap').innerHTML='<div class="empty">Henüz kayıt yok.<br><small>Öğrenciler formu doldurdukça burada görünecek.</small></div>';
      document.getElementById('stat-total').textContent='0';
      return;
    }

    // İlk satır başlık
    const headers = raw[0];
    const rows = raw.slice(1);

    tumKayitlar = rows.map(r => ({
      tarih: r[0]||'',
      ad_soyad: r[1]||'',
      kko_gecisken: r[2]||'',
      kko_sarmal: r[3]||'',
      kko_uzman: r[4]||'',
      kko_dogrusal: r[5]||'',
      zs_gecisken: r[6]||'',
      zs_sarmal: r[7]||'',
      zs_uzman: r[8]||'',
      zs_dogrusal: r[9]||'',
      baskin_kko: r[10]||'',
      baskin_driver: r[11]||'',
      yorum: r[12]||''
    }));

    // İstatistikler
    document.getElementById('stat-total').textContent = tumKayitlar.length;
    const profiller = tumKayitlar.map(r=>r.baskin_kko).filter(Boolean);
    const sayim = {};
    profiller.forEach(p=>sayim[p]=(sayim[p]||0)+1);
    const enCok = Object.entries(sayim).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById('stat-baskin').textContent = enCok ? enCok[0] : '—';
    const son = tumKayitlar[tumKayitlar.length-1];
    document.getElementById('stat-son').textContent = son.ad_soyad || '—';

    renderTable();
  } catch(err) {
    document.getElementById('table-wrap').innerHTML='<div class="empty">Veriler yüklenemedi. Sayfayı yenileyin.</div>';
  }
}

function chipClass(val){
  const v=(val||'').toLowerCase();
  if(v.includes('geçişken')) return 'chip-g';
  if(v.includes('sarmal')) return 'chip-s';
  if(v.includes('uzman')) return 'chip-u';
  if(v.includes('doğrusal')) return 'chip-d';
  return '';
}

function renderTable(){
  const wrap = document.getElementById('table-wrap');
  const rows = [...tumKayitlar].reverse().map((r,i) => `
    <tr>
      <td style="color:var(--faint);font-family:'DM Mono',monospace;font-size:11px">${tumKayitlar.length-i}</td>
      <td style="font-weight:500;white-space:nowrap">${r.ad_soyad||'—'}</td>
      <td style="color:var(--muted);font-size:12px;white-space:nowrap">${r.tarih||'—'}</td>
      <td><span class="chip ${chipClass(r.baskin_kko)}">${r.baskin_kko||'—'}</span></td>
      <td><span class="chip ${chipClass(r.baskin_driver)}">${r.baskin_driver||'—'}</span></td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${r.kko_gecisken||'—'} / ${r.kko_sarmal||'—'} / ${r.kko_uzman||'—'} / ${r.kko_dogrusal||'—'}</td>
      <td><button class="btn-pdf" onclick="downloadPDF(tumKayitlar[${tumKayitlar.length-1-i}])">⬇ PDF</button></td>
    </tr>`).join('');

  wrap.innerHTML = `<table>
    <thead><tr>
      <th>#</th><th>Ad Soyad</th><th>Tarih</th><th>Baskın KKÖ</th><th>Baskın Driver</th><th>KKÖ (G/S/U/D)</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}


const FONT_URL = 'https://lindinn.github.io/fupi-degerlendirme/Roboto-Regular.ttf';

async function downloadPDF(r) {
  const { PDFDocument, rgb, StandardFonts } = PDFLib;

  // Font yükle
  let fontBytes;
  try {
    const res = await fetch(FONT_URL);
    fontBytes = await res.arrayBuffer();
  } catch(e) {
    alert('Font yuklenemedi. Lutfen tekrar deneyin.');
    return;
  }

  const doc = await PDFDocument.create();
  doc.registerFontkit(fontkit);

  // Roboto embed et
  let font, fontBold;
  try {
    font = await doc.embedFont(fontBytes);
    fontBold = await doc.embedFont(fontBytes); // aynı font, bold olmayacak ama Türkçe çalışacak
  } catch(e) {
    // Fallback: Helvetica
    font = await doc.embedFont(StandardFonts.Helvetica);
    fontBold = await doc.embedFont(StandardFonts.HelveticaBold);
  }

  const pageW = 595, pageH = 842, M = 56, CW = pageW - M*2;

  function addPage() {
    const p = doc.addPage([pageW, pageH]);
    return { p, y: pageH - M };
  }

  let { p, y } = addPage();

  const orange = rgb(245/255, 166/255, 35/255);
  const dark = rgb(15/255, 15/255, 26/255);
  const white = rgb(1,1,1);
  const muted = rgb(0.47,0.47,0.6);
  const faint = rgb(0.23,0.23,0.35);
  const textCol = rgb(0.23,0.2,0.08);

  function drawText(page, text, x, yPos, size, color, bold) {
    page.drawText(String(text||''), {
      x, y: yPos, size, font: bold ? fontBold : font, color
    });
  }

  function measureText(text, size) {
    return font.widthOfTextAtSize(String(text||''), size);
  }

  // HEADER
  p.drawRectangle({ x:0, y:pageH-136, width:pageW, height:136, color:dark });
  p.drawRectangle({ x:0, y:pageH-136, width:4, height:136, color:orange });
  drawText(p, 'FUPi KARIYER TASARIMI — fupi.com.tr', M, pageH-40, 9, orange, true);
  drawText(p, 'Kariyer Profil Raporu', M, pageH-72, 18, white, true);
  drawText(p, 'Kariyer Kaliplari Degerlendirme Sistemi', M, pageH-100, 9, muted, false);
  const tarihStr = String(r.tarih||'');
  drawText(p, tarihStr, pageW-M-measureText(tarihStr,9), pageH-100, 9, muted, false);
  y = pageH - 160;

  // İSİM KUTUSU
  p.drawRectangle({ x:M, y:y-44, width:CW, height:44, color:rgb(0.16,0.14,0.06), borderColor:orange, borderWidth:1, borderOpacity:0.7 });
  drawText(p, 'ISIM', M+14, y-18, 8, orange, true);
  drawText(p, String(r.ad_soyad||'—'), M+14, y-36, 13, white, true);
  y -= 62;

  // BASKIN PROFİL
  drawText(p, 'BASKIN KARIYER PROFILI', M, y, 8, muted, true);
  y -= 14;

  const chipColors = {
    'Geçişken': rgb(245/255,166/255,35/255),
    'Sarmal': rgb(127/255,119/255,221/255),
    'Uzman': rgb(29/255,158/255,117/255),
    'Doğrusal': rgb(55/255,138/255,221/255)
  };
  const kkoCol = chipColors[r.baskin_kko] || muted;
  const drCol = chipColors[r.baskin_driver] || muted;

  p.drawRectangle({ x:M, y:y-32, width:CW/2-14, height:32, color:rgb(0.12,0.1,0.04), borderColor:kkoCol, borderWidth:0.8 });
  drawText(p, 'Tipik Kalip', M+11, y-13, 8, kkoCol, true);
  drawText(p, String(r.baskin_kko||'—'), M+11, y-27, 11, kkoCol, true);

  p.drawRectangle({ x:M+CW/2+14, y:y-32, width:CW/2-14, height:32, color:rgb(0.1,0.1,0.16), borderColor:drCol, borderWidth:0.8 });
  drawText(p, 'Yonelim', M+CW/2+25, y-13, 8, drCol, true);
  drawText(p, String(r.baskin_driver||'—'), M+CW/2+25, y-27, 11, drCol, true);
  y -= 50;

  // KKÖ STEN BARLAR
  drawText(p, 'KARIYER KALIPLARI OLCEGI (KKO) — Sten Puani (1-10)', M, y, 8, muted, true);
  y -= 14;

  const normParams = {
    'Gecisken': {mu:3.3923, sd:0.7114},
    'Sarmal':   {mu:4.1601, sd:0.6842},
    'Uzman':    {mu:3.5969, sd:0.6778},
    'Dogrusal': {mu:3.6147, sd:0.7461}
  };

  function hamToStenPDF(ham, boyut) {
    const {mu, sd} = normParams[boyut];
    const z = (ham - mu) / sd;
    const sten = Math.round(2*z + 5.5);
    return Math.min(10, Math.max(1, sten));
  }

  function stenRenk(sten) {
    if(sten <= 2) return rgb(0.88, 0.48, 0.48);
    if(sten <= 4) return rgb(245/255, 166/255, 35/255);
    if(sten <= 6) return rgb(0.5, 0.5, 0.6);
    if(sten <= 8) return rgb(29/255, 158/255, 117/255);
    return rgb(127/255, 119/255, 221/255);
  }

  function stenEtiketPDF(sten) {
    const e={1:'Hic Uygun Degil',2:'Uygun Degil',3:'Uygun Degil',4:'Biraz Uygun',5:'Uygun',6:'Uygun',7:'Oldukca Uygun',8:'Cok Uygun',9:'Cok Uygun',10:'Tamamen Uygun'};
    return e[sten]||'';
  }

  const kkoItems = [
    { lbl:'Gecisken', val:parseFloat(r.kko_gecisken||0), color:rgb(245/255,166/255,35/255) },
    { lbl:'Sarmal',   val:parseFloat(r.kko_sarmal||0),   color:rgb(127/255,119/255,221/255) },
    { lbl:'Uzman',    val:parseFloat(r.kko_uzman||0),    color:rgb(29/255,158/255,117/255) },
    { lbl:'Dogrusal', val:parseFloat(r.kko_dogrusal||0), color:rgb(55/255,138/255,221/255) }
  ].sort((a,b)=>b.val-a.val);

  for(const item of kkoItems) {
    const sten = hamToStenPDF(item.val, item.lbl);
    const sRenk = stenRenk(sten);
    const sEtiket = stenEtiketPDF(sten);
    drawText(p, item.lbl, M, y, 9, rgb(0.37,0.37,0.5), false);
    const barX = M+90, barW = CW-160, barH = 9;
    p.drawRectangle({ x:barX, y:y-9, width:barW, height:barH, color:rgb(0.88,0.88,0.92) });
    const pct = Math.min(Math.max(sten/10, 0), 1);
    if(pct > 0) p.drawRectangle({ x:barX, y:y-9, width:barW*pct, height:barH, color:item.color });
    drawText(p, String(sten), barX+barW+5, y, 10, item.color, true);
    drawText(p, sEtiket, barX+barW+20, y, 8, sRenk, false);
    y -= 20;
  }
  y -= 8;

  // ZS BARLAR — yüzde gösterim
  drawText(p, 'ZORUNLU SECIM — DRIVER KARIYER TIPLERI (maks: 12)', M, y, 8, muted, true);
  y -= 14;

  // Baskın driver kartı
  const drCol2 = chipColors[r.baskin_driver] || muted;
  const driverAciklama = {
    'Geçişken':'Ozgurluk, cesitlilik ve anlik firsatlara aciklik tercihlerinde belirleyici.',
    'Sarmal':'Periyodik buyume ve birikimli gelisim tercihlerinde one cikiyor.',
    'Uzman':'Tek alanda derinlesme ve uzun vadeli ustalaşma tercihlerinde baskin.',
    'Dogrusal':'Yukselme, hiyerarssi ve statu kazanimi tercihlerinde belirleyici.'
  };
  p.drawRectangle({ x:M, y:y-36, width:CW, height:36, color:rgb(0.08,0.08,0.14), borderColor:drCol2, borderWidth:0.8 });
  drawText(p, 'BASKIN DRIVER TIPI', M+11, y-10, 7, drCol2, true);
  drawText(p, String(r.baskin_driver||'—'), M+11, y-22, 12, drCol2, true);
  const dAcik = driverAciklama[r.baskin_driver] || '';
  if(dAcik) drawText(p, dAcik, M+120, y-22, 8, rgb(0.5,0.5,0.6), false);
  y -= 52;

  const zsToplam = 12;
  const zsItems = [
    { lbl:'Gecisken', val:parseInt(r.zs_gecisken||0), color:rgb(245/255,166/255,35/255) },
    { lbl:'Sarmal',   val:parseInt(r.zs_sarmal||0),   color:rgb(127/255,119/255,221/255) },
    { lbl:'Uzman',    val:parseInt(r.zs_uzman||0),     color:rgb(29/255,158/255,117/255) },
    { lbl:'Dogrusal', val:parseInt(r.zs_dogrusal||0),  color:rgb(55/255,138/255,221/255) }
  ].sort((a,b)=>b.val-a.val);

  for(const item of zsItems) {
    drawText(p, item.lbl, M, y, 9, rgb(0.37,0.37,0.5), false);
    const barX = M+90, barW = CW-160, barH = 9;
    p.drawRectangle({ x:barX, y:y-9, width:barW, height:barH, color:rgb(0.88,0.88,0.92) });
    const pct2 = item.val/zsToplam;
    if(pct2 > 0) p.drawRectangle({ x:barX, y:y-9, width:barW*pct2, height:barH, color:item.color });
    const pctStr = Math.round(pct2*100)+'%';
    drawText(p, item.val+'/12  '+pctStr, barX+barW+5, y, 9, item.color, true);
    y -= 20;
  }
  y -= 12;

  // YORUM
  if(r.yorum && r.yorum.trim()) {
    drawText(p, 'KISISEL KARIYER ANALIZI', M, y, 8, muted, true);
    y -= 14;

    // Yorumu satırlara böl
    const words = String(r.yorum).split(' ');
    const lines = [];
    let current = '';
    const maxW = CW - 28;

    for(const word of words) {
      const test = current ? current+' '+word : word;
      if(font.widthOfTextAtSize(test, 9) > maxW) {
        if(current) lines.push(current);
        current = word;
      } else {
        current = test;
      }
    }
    if(current) lines.push(current);

    // Paragrafları da koru
    const paraLines = [];
    String(r.yorum).split('\n').forEach(para => {
      if(!para.trim()) { paraLines.push(''); return; }
      const ws = para.split(' ');
      let cur = '';
      for(const w of ws) {
        const t = cur ? cur+' '+w : w;
        if(font.widthOfTextAtSize(t, 9) > maxW) {
          if(cur) paraLines.push(cur);
          cur = w;
        } else { cur = t; }
      }
      if(cur) paraLines.push(cur);
      paraLines.push('');
    });

    // Kutu yüksekliği hesapla ve çiz
    const lineH = 14;
    const boxH = paraLines.length * lineH + 20;
    const boxY = y - boxH;

    // Sayfa taşıyorsa yeni sayfa
    if(boxY < M + 40) {
      const newPg = addPage();
      p = newPg.p;
      y = newPg.y;
      drawText(p, 'KISISEL KARIYER ANALIZI (devam)', M, y, 8, muted, true);
      y -= 14;
    }

    const finalBoxH = paraLines.length * lineH + 20;
    p.drawRectangle({ x:M, y:y-finalBoxH, width:CW, height:finalBoxH, color:rgb(0.99,0.97,0.93), borderColor:orange, borderWidth:0.5, borderOpacity:0.4 });
    p.drawRectangle({ x:M, y:y-finalBoxH, width:3, height:finalBoxH, color:orange });

    let textY = y - 14;
    for(const line of paraLines) {
      if(line) drawText(p, line, M+14, textY, 9, textCol, false);
      textY -= lineH;
    }
  }

  // FOOTER (son sayfa)
  const pages = doc.getPages();
  const lastPage = pages[pages.length-1];
  lastPage.drawRectangle({ x:0, y:0, width:pageW, height:56, color:dark });
  lastPage.drawRectangle({ x:0, y:56, width:pageW, height:1, color:orange });
  drawText(lastPage, 'FUPi Kariyer Tasarimi — fupi.com.tr', M, 36, 8, muted, false);
  drawText(lastPage, 'Bu rapor FUPi Kariyer Kaliplari Degerlendirme Sistemi tarafindan otomatik olusturulmustur.', M, 22, 7, faint, false);
  const bugun = new Date().toLocaleDateString('tr-TR');
  const raporStr = 'Rapor tarihi: '+bugun;
  drawText(lastPage, raporStr, pageW-M-measureText(raporStr,8), 22, 8, muted, false);

  const pdfBytes = await doc.save();
  const blob = new Blob([pdfBytes], { type:'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ad = (r.ad_soyad||'rapor').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');
  a.href = url;
  a.download = 'FUPi_'+ad+'_'+bugun.replace(/\./g,'-')+'.pdf';
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
