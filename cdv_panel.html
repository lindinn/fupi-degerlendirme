<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FUPİ — CDV Danışman Paneli</title>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.min.js"></script>
<style>
:root{--dark:#3C3489;--med:#534AB7;--deep:#26215C;--light:#EEEDFE;--white:#fff;--text:#1A1A2E;--gray:#F4F4F4;--border:#CCCCCC;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#F0EFF9;color:var(--text);}
#lockScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.lock-card{background:#fff;border-radius:16px;padding:40px 36px;max-width:380px;width:90%;text-align:center;box-shadow:0 4px 24px rgba(60,52,137,.15);}
.lock-logo{font-size:28px;font-weight:800;color:var(--dark);letter-spacing:2px;margin-bottom:4px;}
.lock-sub{font-size:14px;color:#888;margin-bottom:28px;}
.lock-card input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:11px 14px;font-size:15px;text-align:center;margin-bottom:14px;letter-spacing:3px;}
.lock-card input:focus{outline:none;border-color:var(--med);}
.lock-btn{width:100%;background:linear-gradient(135deg,var(--dark),var(--med));color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;}
.lock-err{color:#C0392B;font-size:13px;margin-top:8px;display:none;}
#mainPanel{height:100vh;flex-direction:column;}
.top-bar{background:linear-gradient(135deg,var(--deep),var(--med));color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;}
.top-bar .logo{font-size:20px;font-weight:800;letter-spacing:2px;}
.top-bar .title{font-size:14px;opacity:.85;}
.top-bar .badge{margin-left:auto;background:rgba(255,255,255,.15);border-radius:20px;padding:4px 14px;font-size:12px;}
.panel-body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:280px;background:#fff;border-right:1px solid #E0DEF5;display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-header{padding:14px 16px;border-bottom:1px solid #E0DEF5;font-size:13px;font-weight:700;color:var(--deep);}
.participant-list{overflow-y:auto;flex:1;}
.p-item{padding:12px 16px;border-bottom:1px solid #F0EFF9;cursor:pointer;transition:background .15s;}
.p-item:hover{background:var(--light);}
.p-item.active{background:var(--light);border-left:3px solid var(--med);}
.p-item .p-name{font-size:14px;font-weight:600;}
.p-item .p-date{font-size:11px;color:#888;margin-top:2px;}
.empty-list{padding:24px 16px;text-align:center;color:#AAA;font-size:13px;}
.results-area{flex:1;overflow-y:auto;padding:24px;}
.placeholder{display:flex;align-items:center;justify-content:center;height:100%;color:#AAA;font-size:15px;}
.result-card{background:#fff;border-radius:14px;padding:28px;box-shadow:0 2px 12px rgba(60,52,137,.08);max-width:740px;}
.rc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.rc-name{font-size:20px;font-weight:700;color:var(--dark);}
.rc-date{font-size:13px;color:#888;margin-top:3px;}
.btn-pdf{background:linear-gradient(135deg,var(--dark),var(--med));color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-pdf:hover{opacity:.9;}
.dim-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.dim-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dim-name{width:235px;font-size:13px;font-weight:500;flex-shrink:0;}
.dim-bar-wrap{flex:1;background:#EEECF8;border-radius:6px;height:16px;overflow:hidden;}
.dim-bar-fill{height:16px;border-radius:6px;}
.dim-lbl{font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
</style>
</head>
<body>
<div id="lockScreen">
  <div class="lock-card">
    <div class="lock-logo">FUPİ</div>
    <div class="lock-sub">CDV Danışman Paneli</div>
    <input type="password" id="pwInput" placeholder="Şifre" onkeydown="if(event.key==='Enter') checkPw()">
    <button class="lock-btn" onclick="checkPw()">Giriş</button>
    <div class="lock-err" id="pwErr">Hatalı şifre.</div>
  </div>
</div>
<div id="mainPanel" style="display:none;">
  <div class="top-bar">
    <div class="logo">FUPİ</div>
    <div class="title">Çalışma Değerleri — Danışman Paneli</div>
    <div class="badge" id="countBadge">— katılımcı</div>
  </div>
  <div class="panel-body">
    <div class="sidebar">
      <div class="sidebar-header">Katılımcılar</div>
      <div class="participant-list" id="participantList"><div class="empty-list">Yükleniyor…</div></div>
    </div>
    <div class="results-area" id="resultsArea">
      <div class="placeholder">← Katılımcı seçin</div>
    </div>
  </div>
</div>

function scoreLabel(s){
  if(s>=4.5) return 'Çok Yüksek';
  if(s>=3.75) return 'Yüksek';
  if(s>=3.0) return 'Orta';
  if(s>=2.0) return 'Düşük';
  return 'Çok Düşük';
}
function lblStyle(s){
  if(s>=4.5) return 'background:#E8F8EF;color:#1A7A4A';
  if(s>=3.75) return 'background:#EBF3FC;color:#1565C0';
  if(s>=3.0) return 'background:#F0EFFE;color:#3C3489';
  if(s>=2.0) return 'background:#FEF3E2;color:#E65100';
  return 'background:#FDEDEC;color:#C0392B';
}

function selectParticipant(idx){ selectedIdx=idx; renderList(); renderResults(allData[idx]); }

function renderResults(row){
  const dimData=DIMS.map(d=>({name:d,score:parseFloat(row[d])||0}));
  dimData.sort((a,b)=>b.score-a.score);
  const bars=dimData.map((d,i)=>{
    const pct=((d.score/5)*100).toFixed(0);
    const c=COLORS_CSS[i%COLORS_CSS.length];
    const lbl=scoreLabel(d.score);
    const st=lblStyle(d.score);
    return `<div class="dim-row">
      <div class="dim-dot" style="background:${c}"></div>
      <div class="dim-name">${d.name}</div>
      <div class="dim-bar-wrap"><div class="dim-bar-fill" style="width:${pct}%;background:${c};opacity:.8;"></div></div>
      <div class="dim-lbl" style="${st}">${lbl}</div>
    </div>`;
  }).join('');
  document.getElementById('resultsArea').innerHTML=`
    <div class="result-card">
      <div class="rc-header">
        <div>
          <div class="rc-name">${row['Ad Soyad']||'—'}</div>
          <div class="rc-date">${row['Tarih']||row['Zaman Damgası']||''}</div>
        </div>
        <button class="btn-pdf" onclick="generatePDF(${selectedIdx})">PDF İndir</button>
      </div>

}

function wrapText(text, maxChars) {
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words) {
    const test = cur ? cur + ' ' + w : w;
    if (test.length <= maxChars) { cur = test; }
    else { if (cur) lines.push(cur); cur = w; }
  }
  if (cur) lines.push(cur);
  return lines;
}

function safeTR(s){
  return (s||'')
    .replace(/İ/g,'I').replace(/ı/g,'i').replace(/Ş/g,'S').replace(/ş/g,'s')
    .replace(/Ğ/g,'G').replace(/ğ/g,'g').replace(/Ü/g,'U').replace(/ü/g,'u')
    .replace(/Ö/g,'O').replace(/ö/g,'o').replace(/Ç/g,'C').replace(/ç/g,'c');
}

async function loadFont(doc, bold=false){
  const urls = bold ? [
    'https://cdn.jsdelivr.net/npm/roboto-fontface@0.10.0/fonts/roboto/Roboto-Bold.ttf',
    'https://fonts.gstatic.com/s/roboto/v30/KFOlCnqEu92Fr1MmWUlfBBc4.ttf',
  ] : [
    'https://fonts.gstatic.com/s/roboto/v30/KFOmCnqEu92Fr1Me5Q.ttf',
    'https://cdn.jsdelivr.net/npm/roboto-fontface@0.10.0/fonts/roboto/Roboto-Regular.ttf',
  ];
  for(const url of urls){
    try{
      const bytes=await fetch(url).then(r=>{ if(!r.ok) throw new Error(); return r.arrayBuffer(); });
      return await doc.embedFont(bytes,{subset:true});
    }catch(e){ continue; }
  }
  return null;
}

async function generatePDF(idx){
  const btn=document.querySelector('.btn-pdf');
  const origText=btn.textContent;
  btn.textContent='Oluşturuluyor…'; btn.disabled=true;
  try{
    await _buildPDF(idx);
  }catch(e){
    console.error('PDF hatası:',e);
    alert('PDF oluşturulamadı. Hata: '+e.message);
  }finally{
    btn.textContent=origText; btn.disabled=false;
  }
}

async function _buildPDF(idx){
  const row=allData[idx];
  const {PDFDocument,rgb,StandardFonts}=PDFLib;
  const doc=await PDFDocument.create();
  doc.registerFontkit(fontkit);

  const customFont=await loadFont(doc, false);
  const boldFont=await loadFont(doc, true);
  const fallback=await doc.embedFont(StandardFonts.Helvetica);
  const useCustom=!!customFont;
  const font=customFont||fallback;
  const bFont=boldFont||font;
  const T=(s)=> useCustom ? (s||'') : safeTR(s);

  let logoImg=null;
  try{
    const raw=atob(LOGO_B64);
    const buf=new Uint8Array(raw.length);
    for(let i=0;i<raw.length;i++) buf[i]=raw.charCodeAt(i);
    logoImg=await doc.embedPng(buf.buffer);
  }catch(e){}

  const page=doc.addPage([595,842]);
  const {width,height}=page.getSize();
  const M=50;

  // Dark purple header with logo (DYT report style)
  page.drawRectangle({x:0,y:height-84,width,height:84,color:rgb(0.235,0.204,0.537)});
  let logoX=M, titleX=M;
  if(logoImg){
    const sc=66/logoImg.height;
    const lw=logoImg.width*sc, lh=logoImg.height*sc;
    page.drawImage(logoImg,{x:M,y:height-80,width:lw,height:lh});
    titleX=M+lw+18;
  }
  page.drawText(T('Çalışma Değerleri Ölçeği'),{x:titleX,y:height-44,size:18,font,color:rgb(1,1,1)});
  // Participant
  page.drawText(T(row['Ad Soyad']||''),{x:M,y:height-116,size:17,font,color:rgb(0.149,0.133,0.533)});
  page.drawText(T(row['Tarih']||row['Zaman Damgasi']||''),{x:M,y:height-136,size:10,font,color:rgb(0.55,0.55,0.65)});
  page.drawLine({start:{x:M,y:height-148},end:{x:width-M,y:height-148},thickness:0.5,color:rgb(0.87,0.87,0.99)});

  // Bars
  const dimData=DIMS.map(d=>({name:d,score:parseFloat(row[d])||0}));
  dimData.sort((a,b)=>b.score-a.score);
  const BY=height-168, RH=27, BX=M+202, BW=width-M-BX-110, LX=BX+BW+10;

  dimData.forEach((d,i)=>{
    const y=BY-i*RH;
    const c=COLORS_PDF[i%COLORS_PDF.length];
    const barC=rgb(c[0],c[1],c[2]);
    const dn=T(d.name.length>27?d.name.substring(0,26)+'.':d.name);
    page.drawRectangle({x:M-12,y:y+3,width:8,height:8,color:barC,borderRadius:4});
    page.drawText(dn,{x:M,y:y+3,size:9,font,color:rgb(0.15,0.13,0.2)});
    page.drawRectangle({x:BX,y:y,width:BW,height:13,color:rgb(0.93,0.92,0.97),borderRadius:3});
    page.drawRectangle({x:BX,y:y,width:Math.max(4,(d.score/5)*BW),height:13,color:barC,opacity:0.85,borderRadius:3});
    const lbl=T(scoreLabel(d.score));
    let lc=rgb(0.3,0.27,0.6);
    if(d.score>=4.5) lc=rgb(0.1,0.48,0.29);
    else if(d.score>=3.75) lc=rgb(0.08,0.39,0.75);
    else if(d.score<2.0) lc=rgb(0.75,0.14,0.1);
    else if(d.score<3.0) lc=rgb(0.9,0.32,0.0);
    page.drawText(lbl,{x:LX,y:y+3,size:9,font,color:lc});
  });


  // ─ Summary boxes ─────────────────────────────────────────────
  const topThree = dimData.slice(0, 3);
  const botThree = dimData.slice(-3);

  const boxW = Math.floor((width - 2*M - 10) / 2);
  const boxH = 155;
  const lastBarBottom = BY - 12*RH - 4;
  const boxTopY = lastBarBottom - 24;  // top-left corner Y of boxes
  const box1X = M;
  const box2X = M + boxW + 10;

  function drawSummaryBox(bx, by, bw, bh, items, title, headerBg, headerFg, bodyBg, dimFg) {
    // Body bg with rounded corners
    page.drawRectangle({x:bx, y:by, width:bw, height:bh, color:bodyBg, borderRadius:8});
    // Header band with rounded corners (top only feel)
    page.drawRectangle({x:bx, y:by+bh-26, width:bw, height:26, color:headerBg, borderRadius:8});
    // Cover bottom-half rounding of header to get flat bottom edge
    page.drawRectangle({x:bx, y:by+bh-26, width:bw, height:13, color:headerBg});
    // Title: bold, slightly larger
    page.drawText(T(title), {x:bx+12, y:by+bh-17, size:11, font:bFont, color:headerFg});

    let itemY = by + bh - 42;
    items.forEach(d => {
      const name = T(d.name.length > 30 ? d.name.substring(0,29)+'.' : d.name);
      page.drawText(name, {x:bx+12, y:itemY, size:9, font:bFont, color:dimFg});
      itemY -= 13;
      const desc = T(DIM_DESCS[d.name] || '');
      const lines = wrapText(desc, Math.floor(bw / 4.4));
      lines.slice(0,2).forEach(line => {
        page.drawText(line, {x:bx+12, y:itemY, size:8, font, color:rgb(0.30,0.28,0.42)});
        itemY -= 11;
      });
      itemY -= 8;
    });
  }

  // Left box: Yüksek Değerlendirilenler
  drawSummaryBox(
    box1X, boxTopY - boxH, boxW, boxH, topThree,
    'Yüksek Değerlendirilenler',
    rgb(0.235,0.204,0.537), rgb(1,1,1),
    rgb(0.94,0.93,0.99), rgb(0.15,0.13,0.45)
  );

  // Right box: Düşük Değerlendirilenler
  drawSummaryBox(
    box2X, boxTopY - boxH, boxW, boxH, botThree,
    'Düşük Değerlendirilenler',
    rgb(0.60,0.20,0.20), rgb(1,1,1),
    rgb(0.99,0.96,0.96), rgb(0.45,0.13,0.13)
  );

  page.drawLine({start:{x:M,y:44},end:{x:width-M,y:44},thickness:0.5,color:rgb(0.87,0.87,0.99)});
  page.drawText('FUPi Kariyer Tasarimi — fupi.com.tr',{x:M,y:30,size:8,font,color:rgb(0.6,0.6,0.7)});
  page.drawText('Bu rapor kisisel kullanim icin hazirlanmistir.',{x:width-M-200,y:30,size:8,font,color:rgb(0.6,0.6,0.7)});

  const pdfBytes=await doc.save();
  const blob=new Blob([pdfBytes],{type:'application/pdf'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='CDV_'+(row['Ad Soyad']||'rapor').replace(/\s+/g,'_')+'.pdf';
  a.click(); URL.revokeObjectURL(url);
}
