.boyut-kutu.zayif{border:2px solid #D70F14;background:#FFF5F5;}

// Ana kategoriler için renk
const KAT_RENKLER = {
  "Motivasyon": "#0097A7",
  "Proaktiflik": "#F2940F",
  "Öğrenme": "#72AB24",
  "Bilişsel": "#3C3489",
  "Sosyal": "#A22E7F"
};

const scores = {};

function buildGrid(){
  const grid = document.getElementById("kategori-grid");
  KATEGORILER.forEach(kat => {
    const blok = document.createElement("div");
    blok.className = "kategori-blok";
    blok.innerHTML = `<div class="kategori-baslik">${kat.baslik}</div>` +
      kat.boyutlar.map(b => `
        <div class="boyut-row">
          <div class="boyut-ad">${b.ad}</div>
          <input class="puan-inp mid" id="inp-${b.key}" type="number" min="1" max="10" step="1" value="5"
            oninput="onInput('${b.key}',this.value)" onblur="onBlur('${b.key}',this.value)"/>
        </div>`).join("");
    grid.appendChild(blok);
    kat.boyutlar.forEach(b => scores[b.key] = 5);
  });
}

function onInput(key,val){
  const v=parseInt(val);
  if(!isNaN(v)&&v>=1&&v<=10){ scores[key]=v; updateInputColor(key,v); }
}
function onBlur(key,val){
  let v=parseInt(val); if(isNaN(v)||v<1)v=1; if(v>10)v=10;
  scores[key]=v; document.getElementById("inp-"+key).value=v; updateInputColor(key,v);
}
function updateInputColor(key,v){
  const el=document.getElementById("inp-"+key);
  el.className="puan-inp "+(v>=7?"high":v>=4?"mid":"low");
}

function generateRapor(){
  const ad = document.getElementById("danisan-ad").value.trim();
  const tarih = new Date().toLocaleDateString("tr-TR");
  document.getElementById("rapor-alt").textContent = (ad||"Danışan") + " · " + tarih;

  // Tüm boyutları puana göre sırala
  const tumBoyutlar = KATEGORILER.flatMap(k => k.boyutlar.map(b => ({...b, puan: scores[b.key]})));
  const sirali = [...tumBoyutlar].sort((a,b) => b.puan - a.puan);
  const gucluler = sirali.slice(0,3);
  const zayiflar = sirali.slice(-3).reverse();

  // Kategori ortalamaları
  const katOrta = {
    "Motivasyon": ortalama(["guc","prestij","etki_birakma","optimizm","olumsuz_duygu","sosyal_kaynak","ise_baglilik","is_motivasyonu","sirkete_baglilik"]),
    "Proaktiflik": ortalama(["fark_yaratma","faydali_olma","icsel_motivasyon","bagimsiz_hareket","kader_belirleme","oz_yeterlilik","basari_gudusu","risk_alma","cok_calisma"]),
    "Öğrenme": ortalama(["ogrenme_meraki","ogrendiklerini_hayata","deneyimden_ogrenme","belirsizlik_tolerans","degisime_aciklik","degisim_firsat","uyum_yeteneği","zihinsel_esneklik","yenilikci_cozum"]),
    "Bilişsel": ortalama(["analiz_yeteneği","varsayim_kavrama","akil_yurutme","durum_farkindaligi","genis_bakis","ortuk_baglantilar","is_detaylari","bilgi_pratik","uzmanlik_gelistirme"]),
    "Sosyal": ortalama(["empati","baskalarına_duyarli","farklilik_saygi","isbirligi_yatkinlik","alcakgonullilik","anlasmazlik_yonetme","ikna","etkileme","politik_farkindalik"]),
  };

  // En güçlü ana kategori
  const enGucluKat = Object.entries(katOrta).sort((a,b)=>b[1]-a[1])[0];
  const enZayifKat = Object.entries(katOrta).sort((a,b)=>a[1]-b[1])[0];

  let html = "";

  // Kategori özet
  html += `<div style="margin-bottom:20px;">
    <div style="font-size:13px;font-weight:700;color:#3C3489;margin-bottom:10px;">Ana Kategori Profili</div>
    <div class="kategori-ozet-grid">`;
  Object.entries(katOrta).forEach(([kat,ort])=>{
    const renk = KAT_RENKLER[kat]||"#3C3489";
    html += `<div class="kat-badge">
      <div class="kat-badge-ad">${kat}</div>
      <div class="kat-badge-puan" style="color:${renk};">${ort}</div>
    </div>`;
  });
  html += `</div></div>`;

  // En güçlü 3
  html += `<div class="yon-baslik guclu">✦ En Güçlü 3 Alan — Kariyer Danışmanlığı Yorumu</div>`;
  gucluler.forEach(b => {
    const yorum = YORUMLAR[b.key];
    if(!yorum) return;
    html += `<div class="boyut-kutu guclu">
      <div class="boyut-kutu-baslik">${b.ad}</div>
      <div class="boyut-kutu-puan">Sten ${b.puan} — Güçlü Alan</div>
      <div class="boyut-kutu-metin">${yorum.yuksek}</div>
    </div>`;
  });

  // En zayıf 3
  html += `<div class="yon-baslik zayif" style="margin-top:22px;">⚠ Öncelikli Gelişim Alanları — Kariyer Danışmanlığı Yorumu</div>`;
  zayiflar.forEach(b => {
    const yorum = YORUMLAR[b.key];
    if(!yorum) return;
    html += `<div class="boyut-kutu zayif">
      <div class="boyut-kutu-baslik">${b.ad}</div>
      <div class="boyut-kutu-puan">Sten ${b.puan} — Öncelikli Gelişim Odağı</div>
      <div class="boyut-kutu-metin">${yorum.dusuk}</div>
    </div>`;
  });

  // Genel profil özeti
  const genelYorum = buildGenelYorum(ad, enGucluKat, enZayifKat, gucluler, zayiflar);
  html += `<div class="profil-ozet" style="margin-top:22px;">
    <div class="profil-ozet-baslik">Genel Potansiyel Profili</div>
    <div class="profil-ozet-metin">${genelYorum}</div>
  </div>`;

  document.getElementById("rapor-icerik").innerHTML = html;
  const sec = document.getElementById("rapor-section");
  sec.style.display = "block";
  sec.scrollIntoView({behavior:"smooth"});
}

function ortalama(keys){
  const vals = keys.map(k => scores[k]||5);
  return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
}

function buildGenelYorum(ad, enGuclu, enZayif, gucluler, zayiflar){
  const isim = ad || "Danışan";
  const gAdlar = gucluler.map(b=>b.ad).join(", ");
  const zAdlar = zayiflar.map(b=>b.ad).join(", ");
  return `${isim}'ın TALEX profili, ${enGuclu[0]} alanında belirgin bir güç yoğunlaşması (Ort. ${enGuclu[1]}) göstermektedir. Bireysel güçlü alanlar incelendiğinde <strong>${gAdlar}</strong> boyutları öne çıkmaktadır; bu kombinasyon kariyer danışmanlığı sürecinde tercih edilen rol yapısı ve çalışma ortamı seçimleri için önemli bir rehber işlevi görmektedir. Öte yandan <strong>${zAdlar}</strong> boyutlarındaki düşük puanlar kariyer planlamasında dikkat gerektiren kısıtlar olarak değerlendirilmelidir; bu alanlar ya gelişim hedefi olarak çalışılabilir ya da bu kapasitelerin yoğun kullanılmadığı rol yapıları öncelikli tercih olarak belirlenebilir. ${enGuclu[0]} ile ${enZayif[0]} alanları arasındaki zıtlık (${enGuclu[1]} vs ${enZayif[1]}) bu profilin belirgin güçleri olan ancak bazı alanlarda yapısal kısıtlar taşıyan bir tablo sergilediğini ortaya koymaktadır.`;
}

buildGrid();
</script>

</html>
